<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio de Correo | RU Coach</title>
</head>

<body
    style="background-color: #0b0a0d; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%"
        style="max-width: 540px; margin: 40px auto; padding: 0 20px;">
        <tr>
            <td align="center" style="padding-bottom: 32px;">
                <img src="https://rucoach-development.vercel.app/android-chrome-512x512.png" width="64" height="64"
                    alt="RU Coach Logo" style="border-radius: 14px; display: block; margin: 0 auto;">
                <div style="margin-top: 12px;">
                    <h2
                        style="color: #e5a84d; font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -0.05em;">
                        RU Coach</h2>
                    <p
                        style="color: #a1a1aa; font-size: 10px; font-weight: 600; margin: 2px 0 0; text-transform: uppercase; letter-spacing: 0.2em;">
                        Rodrigo Urbina</p>
                </div>
            </td>
        </tr>
        <tr>
            <td style="background-color: #18171a; padding: 40px; border-radius: 24px; border: 1px solid #2a292d;">
                <h1 style="color: #ffffff; font-size: 24px; font-weight: 700; text-align: center; margin: 0 0 24px;">
                    Confirma tu nuevo email</h1>
                <p style="color: #a1a1aa; font-size: 16px; line-height: 26px; text-align: center; margin: 0 0 20px;">
                    Has solicitado cambiar tu email a <strong>{{ .NewEmail }}</strong>. Haz clic debajo para confirmar el cambio.
                </p>
                <div style="text-align: center; margin: 32px 0;">
                    <a href="{{ .ConfirmationURL }}"
                        style="background-color: #e5a84d; border-radius: 12px; color: #0a0a0a; font-size: 16px; font-weight: 700; text-decoration: none; padding: 14px 28px; display: inline-block;">
                        Confirmar nuevo correo
                    </a>
                </div>
                <hr style="border: 0; border-top: 1px solid #27272a; margin: 20px 0;">
                <p style="color: #52525b; font-size: 12px; line-height: 20px; text-align: center; margin: 0;">
                    © 2026 RU Coach Premium | Rodrigo Urbina
                </p>
            </td>
        </tr>
    </table>
</body>

</html>
