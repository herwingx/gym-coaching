<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin Conexión - GymCoach</title>
  <style>
    /**
     * Mismos tokens que app/globals.css → bloque .dark
     * (PWA: HTML estático; no puede importar Tailwind)
     */
    :root {
      --radius: 0.65rem;
      --background: oklch(0.141 0.005 285.823);
      --foreground: oklch(0.985 0 0);
      --card: oklch(0.21 0.006 285.885);
      --card-foreground: oklch(0.985 0 0);
      --primary: oklch(0.795 0.184 86.047);
      --primary-foreground: oklch(0.421 0.095 57.708);
      --secondary: oklch(0.274 0.006 286.033);
      --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.274 0.006 286.033);
      --muted-foreground: oklch(0.705 0.015 286.067);
      --border: oklch(1 0 0 / 10%);
      --input: oklch(1 0 0 / 15%);
      --ring: oklch(0.421 0.095 57.708);
      --success: oklch(0.7 0.18 145);
      --success-foreground: oklch(0.985 0 0);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--background);
      color: var(--foreground);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .offline-card {
      background-color: var(--card);
      color: var(--card-foreground);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      max-width: 28rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 25px -5px oklch(0 0 0 / 0.25);
      animation: appear 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes appear {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .icon-box {
      width: 4.5rem;
      height: 4.5rem;
      background-color: color-mix(in oklch, var(--primary) 14%, transparent);
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      color: var(--primary);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: var(--foreground);
    }

    .lede {
      color: var(--muted-foreground);
      font-size: 0.875rem;
      line-height: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .status-badge {
      background-color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 2rem;
      text-align: left;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .status-badge svg {
      width: 1.25rem;
      height: 1.25rem;
      color: var(--muted-foreground);
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    .status-text {
      font-size: 0.8rem;
      color: var(--muted-foreground);
      font-weight: 500;
      line-height: 1.4;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      height: 2.75rem;
      padding: 0 1.5rem;
      cursor: pointer;
      transition: opacity 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
      border: none;
      width: 100%;
      outline: none;
    }

    .btn:focus-visible {
      outline: 2px solid var(--ring);
      outline-offset: 2px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: var(--primary);
      color: var(--primary-foreground);
    }

    .btn-primary:hover {
      opacity: 0.92;
    }

    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--foreground);
    }

    .btn-secondary:hover {
      background-color: var(--secondary);
      color: var(--secondary-foreground);
    }

    svg.main-icon {
      width: 2rem;
      height: 2rem;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon-box">
      <svg class="main-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/></svg>
    </div>
    <h1>Sin conexión</h1>
    <p class="lede">No se pudo conectar al servidor de GymCoach. Revisa tu señal de internet para continuar entrenando.</p>

    <div class="status-badge">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div class="status-text">Puedes seguir navegando por el contenido guardado. Tus datos se sincronizarán al recuperar la señal.</div>
    </div>

    <div class="buttons">
      <button type="button" class="btn btn-primary" id="retry-btn" onclick="location.reload()">
        Reintentar conexión
      </button>
      <button type="button" class="btn btn-secondary" onclick="history.back()">
        Volver atrás
      </button>
    </div>
  </div>

  <script>
    window.addEventListener('online', () => {
      const btn = document.getElementById('retry-btn');
      if (!btn) return;
      btn.textContent = '¡Conectado! Recargando...';
      btn.style.backgroundColor = 'var(--success)';
      btn.style.color = 'var(--success-foreground)';

      setTimeout(() => {
        location.href = '/';
      }, 1000);
    });
  </script>
</body>
</html>
